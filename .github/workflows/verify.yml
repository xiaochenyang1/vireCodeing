name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile-and-api:
    runs-on: ubuntu-latest
    env:
      TRUCK_PLATFORM_API_BASE_URL: http://localhost:3000/api
      DATABASE_URL: postgresql://truck:truck@localhost:5432/truck_platform
      TEST_DATABASE_URL: postgresql://truck:truck@localhost:5432/truck_platform_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: truck
          POSTGRES_PASSWORD: truck
          POSTGRES_DB: truck_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U truck -d truck_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: npm

      - name: Install mobile dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm --prefix apps/api ci

      - name: Write platform runtime config
        run: npm run platform:config:write

      - name: Test mobile workspace
        run: npx jest --runInBand

      - name: Typecheck mobile workspace
        run: npx tsc --noEmit

      - name: Lint mobile workspace
        run: npm run lint

      - name: Test API workspace
        run: npm --prefix apps/api test

      - name: Typecheck API workspace
        run: npm --prefix apps/api run typecheck

      - name: Lint API workspace
        run: npm --prefix apps/api run lint

      - name: Validate Prisma schema
        run: npm --prefix apps/api run prisma:validate

      - name: Build API workspace
        run: npm run api:build

      - name: Verify PostgreSQL coupon migration, atomicity, and financial ledger smoke flows
        run: npm --prefix apps/api run db:test:postgres:bootstrap
