openapi: 3.0.3
info:
  title: Truck Platform Stage 1 API
  version: 0.1.0
servers:
  - url: http://localhost:3000/api
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /auth/send-code:
    post:
      summary: Send verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCodeRequest'
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCodeResponse'
        '429':
          description: Verification code sending is rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_CODE_RATE_LIMITED
                message: 验证码发送过于频繁
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '502':
          description: Verification code delivery provider failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_CODE_DELIVERY_FAILED
                message: 验证码发送失败
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
  /me/messages:
    get:
      summary: List inbox messages for the current user
      description: First-slice inbox fact source for order and service notifications. Push delivery is sandbox only.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: unreadOnly
          in: query
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/InboxMessageCategory'
      responses:
        '200':
          description: Inbox message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMessageListResponse'
        '401':
          description: AUTH_ACCESS_TOKEN_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/messages/read-all:
    post:
      summary: Mark all inbox messages as read for the current user
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
      responses:
        '200':
          description: Mark-all-read result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMarkAllReadResponse'
        '401':
          description: AUTH_ACCESS_TOKEN_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/messages/{messageId}/read:
    post:
      summary: Mark one inbox message as read
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMessageResponse'
        '404':
          description: MESSAGE_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/device-token:
    post:
      summary: Register a device push notification token
      description: Registers or reactivates the push notification token for the current user's device. Re-registering an existing token updates its device binding and last-used timestamp. Registering a new token on the same device deactivates previous tokens.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceTokenRequest'
      responses:
        '200':
          description: Token registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePushTokenResponse'
        '400':
          description: PUSH_TOKEN_INVALID or DEVICE_ID_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: AUTH_ACCESS_TOKEN_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/device-tokens:
    get:
      summary: List active device push tokens for the current user
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
      responses:
        '200':
          description: Active device tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePushTokenListResponse'
        '401':
          description: AUTH_ACCESS_TOKEN_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /maps/geocode:
    post:
      summary: Geocode an address through the configured map provider
      description: Defaults to sandbox deterministic coordinates. MAP_PROVIDER=amap uses Amap Web Service geocode. Not an in-app map SDK.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeocodeRequest'
      responses:
        '200':
          description: Geocode success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeResponse'
        '400':
          description: MAP_ADDRESS_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: MAP_PROVIDER_UNAVAILABLE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /maps/reverse-geocode:
    post:
      summary: Reverse geocode coordinates through the configured map provider
      description: Defaults to sandbox formatted address text. MAP_PROVIDER=amap uses Amap Web Service regeo.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReverseGeocodeRequest'
      responses:
        '200':
          description: Reverse geocode success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeResponse'
        '400':
          description: MAP_COORDINATES_INVALID or MAP_ADDRESS_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: MAP_PROVIDER_UNAVAILABLE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /driver/location:
    post:
      summary: Report the current driver location snapshot
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportDriverLocationRequest'
      responses:
        '200':
          description: Location snapshot saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverLocationSnapshotResponse'
        '409':
          description: DRIVER_LOCATION_ORDER_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /shipper/orders/{orderId}/driver-location:
    get:
      summary: Read the assigned driver latest location for a shipper order
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest driver location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverLocationSnapshotResponse'
        '404':
          description: ORDER_NOT_FOUND or DRIVER_LOCATION_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /driver/orders/{orderId}/navigation-targets:
    get:
      summary: Read pickup and delivery navigation targets for an assigned driver order
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/BearerAuthHeader'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Navigation targets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverNavigationTargetsResponse'
        '404':
          description: ORDER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      summary: Login with phone and verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/password-login:
    post:
      summary: Login with phone and password
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
      responses:
        '200':
          description: Password login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordLoginResponse'
        '401':
          description: Phone or password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_PASSWORD_INVALID
                message: 手机号或密码错误
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/admin/password-login:
    post:
      summary: Login admin with phone and password
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPasswordLoginRequest'
      responses:
        '200':
          description: Admin password login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordLoginResponse'
        '401':
          description: Phone or password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_PASSWORD_INVALID
                message: 手机号或密码错误
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/register:
    post:
      summary: Register with phone and verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Register success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/reset-password:
    post:
      summary: Reset password with phone and verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordResponse'
        '401':
          description: Phone or verification code is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_PASSWORD_RESET_INVALID
                message: 手机号或验证码错误
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/change-password:
    post:
      summary: Change current authenticated user password
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password change success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        '401':
          description: Current password or access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_PASSWORD_INVALID
                message: 当前密码错误
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/refresh:
    post:
      summary: Refresh access token
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/logout:
    post:
      summary: Logout current device session
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
  /auth/sessions:
    get:
      summary: List current-user active auth sessions
      description: Returns active refresh sessions for the current authenticated user. Device identifiers are returned as-is so the current mobile installation can match its stored deviceId and offer first-slice revoke-other-sessions management.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current-user active auth sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfAuthSessionListResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/sessions/revoke-other-sessions:
    post:
      summary: Revoke current-user sessions except current device
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeOtherSelfAuthSessionsRequest'
      responses:
        '200':
          description: Other current-user session revoke result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeOtherSelfAuthSessionsResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /me:
    get:
      summary: Current user profile
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /files/upload-intents:
    post:
      summary: Create file upload intent
      description: Creates a pending file object for the current user and returns a first-slice upload URL. This stage records metadata only; real object storage direct upload can replace the uploadUrl later.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileUploadIntentRequest'
      responses:
        '200':
          description: File upload intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadIntentResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /files/{fileId}:
    get:
      summary: Get current user file metadata
      description: Returns file metadata for the current file owner. Admin users may read any file metadata; non-owner users receive FILE_NOT_FOUND so file ids cannot be enumerated across accounts.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          example: file_01J1Z7P7V2QM9B3V8M3G1N6K8S
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadRecordResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
        '404':
          description: File does not exist or does not belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
  /files/{fileId}/uploaded:
    post:
      summary: Confirm file upload completion
      description: Marks a current user's pending file object as uploaded before the upload intent expires. In s3-compatible storage mode the backend first verifies the remote object with a signed HEAD request before changing state.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          example: file_01J1Z7P7V2QM9B3V8M3G1N6K8S
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmFileUploadedRequest'
      responses:
        '200':
          description: File upload confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadRecordResponse'
        '404':
          description: File does not exist or does not belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '409':
          description: File is not pending, the upload intent has expired, or the local binary body does not match the declared byteSize/contentType
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 文件状态不允许确认
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /files/storage-callbacks/s3-compatible:
    post:
      summary: Confirm S3 compatible storage callback
      description: Confirms a pending file from a signed S3-compatible storage callback, stores optional etag/versionId metadata, and marks the file as uploaded. Valid repeated callbacks with matching metadata are idempotent. The callback signature is HMAC-SHA256 using FILE_STORAGE_CALLBACK_SIGNING_SECRET over fileId, objectKey, byteSize, contentType, etag and versionId joined by newlines.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmStorageCallbackRequest'
      responses:
        '200':
          description: Storage callback accepted and file upload confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadRecordResponse'
        '400':
          description: Storage callback signature is invalid or callback signing secret is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STORAGE_CALLBACK_INVALID
                message: 对象存储回调签名无效
                requestId: req_storage_callback
                timestamp: '2026-07-07T05:00:00.000Z'
        '404':
          description: File does not exist or objectKey does not match the file record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_storage_callback
                timestamp: '2026-07-07T05:00:00.000Z'
        '409':
          description: File state, upload intent expiry, byteSize, contentType, etag or versionId does not allow callback confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 对象存储回调元数据与上传意图不一致
                requestId: req_storage_callback
                timestamp: '2026-07-07T05:00:00.000Z'
  /files/maintenance/reject-expired-pending:
    post:
      summary: Reject expired pending file upload intents
      description: Admin-only maintenance endpoint. Marks pending file objects older than the configured upload expiry cutoff as rejected, without touching uploaded files or current pending upload intents.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Expired pending files rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectExpiredPendingFilesResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Current authenticated user is not an admin, or authenticated user is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    code: AUTH_FORBIDDEN
                    message: 当前账号不是管理员
                    requestId: req_file_cleanup
                    timestamp: '2026-07-07T06:00:00.000Z'
                disabled:
                  value:
                    code: AUTH_USER_DISABLED
                    message: 账号已禁用
                    requestId: req_file_cleanup
                    timestamp: '2026-07-07T06:00:00.000Z'
  /files/maintenance/files:
    get:
      summary: List file maintenance records
      description: Admin-only maintenance endpoint. Returns paged file records so operators can filter pending, uploaded or rejected files by purpose, owner and keyword before triggering cleanup. Keyword currently matches file id, ownerUserId, objectKey, publicUrl, contentType, etag and versionId.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
        - { name: status, in: query, schema: { type: string, enum: [pending, uploaded, rejected] } }
        - { name: purpose, in: query, schema: { type: string, enum: [avatar, identity, cargo, exception, evaluation, receipt, invoice] } }
        - { name: ownerUserId, in: query, schema: { type: string, maxLength: 120 } }
        - { name: keyword, in: query, schema: { type: string, maxLength: 120 } }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File maintenance page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFileMaintenanceFilesResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Current authenticated user is not an admin, or authenticated user is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    code: AUTH_FORBIDDEN
                    message: 当前账号不是管理员
                    requestId: req_file_list
                    timestamp: '2026-07-18T03:00:00.000Z'
                disabled:
                  value:
                    code: AUTH_USER_DISABLED
