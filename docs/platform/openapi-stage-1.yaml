        '200': { description: Case moved to processing, content: { application/json: { schema: { $ref: '#/components/schemas/OrderExceptionCaseResponse' } } } }
        '409': { description: EXCEPTION_CASE_STATE_INVALID or EXCEPTION_CASE_CONFLICT, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /admin/order-exception-cases/{caseId}/resolve:
    post:
      summary: Resolve a processing exception case and record compensation decision
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - { name: caseId, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveOrderExceptionCaseRequest' }
      responses:
        '200': { description: Case resolved, content: { application/json: { schema: { $ref: '#/components/schemas/OrderExceptionCaseResponse' } } } }
        '409': { description: EXCEPTION_CASE_STATE_INVALID or EXCEPTION_CASE_CONFLICT, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /admin/order-exception-cases/{caseId}/close:
    post:
      summary: Close a resolved exception case
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - { name: caseId, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOrderExceptionCaseRequest' }
      responses:
        '200': { description: Case closed, content: { application/json: { schema: { $ref: '#/components/schemas/OrderExceptionCaseResponse' } } } }
        '409': { description: EXCEPTION_CASE_STATE_INVALID or EXCEPTION_CASE_CONFLICT, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /admin/order-exception-cases/{caseId}/compensation/execute:
    post:
      summary: Execute a resolved pending compensation through the financial ledger
      description: >-
        Moves a resolved case with compensationStatus=pending to compensationStatus=executed by
        creating a balanced order_compensation ledger transaction. Driver compensation credits the
        driver wallet; shipper compensation records an offline clearing entry. The platform funds the
        compensation (platform_revenue is debited). Requires an Idempotency-Key and the case
        baseUpdatedAtIso. The transaction is created once per case (FinancialTransaction is unique on
        type + caseId); a replayed key returns the same executed case. This slice does not support
        multi-party split compensation, original-channel card refunds, or appeal multi-level review.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - { name: caseId, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExecuteOrderExceptionCaseCompensationRequest' }
      responses:
        '200': { description: Compensation executed, content: { application/json: { schema: { $ref: '#/components/schemas/OrderExceptionCaseResponse' } } } }
        '409':
          description: >-
            EXCEPTION_CASE_CONFLICT, EXCEPTION_CASE_COMPENSATION_NOT_EXECUTABLE,
            EXCEPTION_CASE_COMPENSATION_ALREADY_EXECUTED or IDEMPOTENCY_KEY_REUSED
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
        '404': { description: EXCEPTION_CASE_NOT_FOUND, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /shipper/orders/{orderId}/exception-cases/{caseId}/appeal:
    post:
      summary: Appeal a resolved exception case as the order shipper
      description: >-
        Lets the order shipper reopen a resolved case (that has not had compensation executed) back to
        processing with an appeal reason. Requires the case baseUpdatedAtIso. Unrelated users receive
        EXCEPTION_CASE_NOT_FOUND. Executed compensation or an already-requested appeal returns
        EXCEPTION_CASE_APPEAL_NOT_ALLOWED.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - { name: orderId, in: path, required: true, schema: { type: string } }
        - { name: caseId, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppealOrderExceptionCaseRequest' }
      responses:
        '200': { description: Case reopened for appeal, content: { application/json: { schema: { $ref: '#/components/schemas/OrderExceptionCaseResponse' } } } }
        '404': { description: EXCEPTION_CASE_NOT_FOUND, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '409': { description: EXCEPTION_CASE_CONFLICT or EXCEPTION_CASE_APPEAL_NOT_ALLOWED, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /driver/orders/{orderId}/exception-cases/{caseId}/appeal:
    post:
      summary: Appeal a resolved exception case as the accepted driver
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - { name: orderId, in: path, required: true, schema: { type: string } }
        - { name: caseId, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppealOrderExceptionCaseRequest' }
      responses:
        '200': { description: Case reopened for appeal, content: { application/json: { schema: { $ref: '#/components/schemas/OrderExceptionCaseResponse' } } } }
        '404': { description: EXCEPTION_CASE_NOT_FOUND, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '409': { description: EXCEPTION_CASE_CONFLICT or EXCEPTION_CASE_APPEAL_NOT_ALLOWED, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /admin/auth/sessions:
    get:
      summary: List admin-managed active sessions
      description: Returns active refresh sessions for the first-slice session governance console. The default `scope=current_admin` keeps the current admin self-governance view, while `scope=all` lets admin search platform sessions by user type, keyword and device-risk tags. Refresh token values are never exposed, and the response includes first-slice device-risk summary counters.
