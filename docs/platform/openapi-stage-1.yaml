      responses:
        '200':
          description: Current shipper invoice application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperInvoiceApplicationResponse'
        '400':
          description: Request validation failed or vat-special enterprise verification is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequest:
                  value:
                    code: VALIDATION_ERROR
                    message: 至少选择一笔开票订单
                    requestId: req_local
                    timestamp: '2026-07-09T09:00:00.000Z'
                vatSpecialRequiresEnterprise:
                  value:
                    code: VALIDATION_ERROR
                    message: 增值税专用发票需先提交企业认证资料
                    requestId: req_local
                    timestamp: '2026-07-09T09:00:00.000Z'
        '404':
          description: One or more selected orders do not exist or do not belong to current shipper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: ORDER_NOT_FOUND
                message: 订单不存在
                requestId: req_local
                timestamp: '2026-07-09T09:00:00.000Z'
        '409':
          description: Selected orders are not completed, have no invoiceable amount, or are already occupied by a non-rejected invoice application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                orderNotCompleted:
                  value:
                    code: ORDER_STATE_INVALID
                    message: 仅已完成订单可申请发票
                    requestId: req_local
                    timestamp: '2026-07-09T09:00:00.000Z'
                orderAmountInvalid:
                  value:
                    code: ORDER_STATE_INVALID
                    message: 订单金额不可开票
                    requestId: req_local
                    timestamp: '2026-07-09T09:00:00.000Z'
                orderOccupied:
                  value:
                    code: ORDER_STATE_INVALID
                    message: 订单已存在开票申请
