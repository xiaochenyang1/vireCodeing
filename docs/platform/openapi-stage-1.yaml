        - name: expiresAtIso
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-07-06T03:10:00.000Z'
        - name: signature
          in: query
          required: true
          schema:
            type: string
          example: 92ad73eab5d5a99628f721aff86b9d439b0335d31e275c3bf733645ff52f449d
