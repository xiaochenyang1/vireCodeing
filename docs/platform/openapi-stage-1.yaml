  /shipper/orders:
    post:
      summary: Create shipper order
      description: Requires Idempotency-Key and has no optimistic-concurrency baseline. The create request body does not contain baseUpdatedAtIso. Reusing the same Idempotency-Key with the same normalized request replays the first successful order snapshot and does not create another order or another created event. The order, created event, coupon compare-and-set, idempotency reservation and response snapshot commit in one database transaction.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipperOrderRequest'
      responses:
        '200':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperOrderResponse'
        '400':
          description: Idempotency key is missing or invalid, or the create request is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: IDEMPOTENCY_KEY_INVALID
                message: Idempotency-Key 必须是合法 UUID
                requestId: req_local
                timestamp: '2026-07-14T08:00:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ShipperOnlyError'
        '409':
          description: Idempotency key is reused or expired, or coupon validation/compare-and-set failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                idempotencyKeyReused:
                  summary: The key was already used for a different normalized create request
                  value:
                    code: IDEMPOTENCY_KEY_REUSED
                    message: Idempotency-Key 已被其他请求使用
                    requestId: req_local
                    timestamp: '2026-07-14T08:00:00.000Z'
                idempotencyKeyExpired:
                  summary: The stored replay snapshot has expired
                  value:
                    code: IDEMPOTENCY_KEY_EXPIRED
                    message: Idempotency-Key 已过期
                    requestId: req_local
                    timestamp: '2026-07-14T08:00:00.000Z'
                couponNotAvailable:
                  summary: The coupon is not usable or lost the transaction compare-and-set race
                  value:
                    code: PROFILE_COUPON_NOT_AVAILABLE
                    message: 优惠券当前不可用
                    requestId: req_local
                    timestamp: '2026-07-14T08:00:00.000Z'
                couponPriceMismatch:
                  summary: Client coupon pricing does not match the server coupon record
                  value:
                    code: PROFILE_COUPON_PRICE_MISMATCH
                    message: 优惠券金额与服务端记录不一致
                    requestId: req_local
                    timestamp: '2026-07-14T08:00:00.000Z'
    get:
      summary: List current shipper orders
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: status
          in: query
          required: false
          description: Single status filter. Do not send together with statuses.
          schema:
            $ref: '#/components/schemas/ShipperOrderStatus'
        - name: statuses
          in: query
          required: false
          description: Comma-separated status collection. Used by mobile active orders, for example loading and transporting. Spaces and empty parts are ignored, duplicate statuses are normalized away. Do not send together with status.
          schema:
            type: string
          example: loading,transporting
        - name: keyword
          in: query
          required: false
          description: Search order number, cargo, pickup/delivery address, contacts, phones and vehicle requirement text. Whitespace is trimmed, blank values are ignored, and the value must be 100 characters or fewer.
          schema:
            type: string
            maxLength: 100
          example: 南山门店
        - name: createdFromIso
          in: query
          required: false
          description: Inclusive created-at lower bound in ISO 8601 format. Whitespace is trimmed and blank values are ignored. Must be earlier than createdToIso when both bounds are present.
          schema:
            type: string
            format: date-time
          example: '2026-07-01T00:00:00.000Z'
        - name: createdToIso
          in: query
          required: false
          description: Exclusive created-at upper bound in ISO 8601 format. Whitespace is trimmed and blank values are ignored. Must be later than createdFromIso when both bounds are present.
          schema:
            type: string
            format: date-time
          example: '2026-07-03T00:00:00.000Z'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current shipper orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperOrderListResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ShipperOnlyError'
