      type: object
      required: [routes]
      properties:
        routes:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/ShipperFrequentRoute'
        clientUpdatedAtIso:
          type: string
          format: date-time
          example: '2026-07-04T08:00:00.000Z'
        baseUpdatedAtIso:
          type: string
          format: date-time
          description: Optional optimistic concurrency base. When provided and the current server frequent routes updatedAtIso is different, the backend rejects the save with PROFILE_FREQUENT_ROUTES_CONFLICT.
          example: '2026-07-04T08:30:00.000Z'
