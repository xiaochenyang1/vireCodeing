      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Admin session governance audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthSessionGovernanceAuditListResponse'
        '403':
          $ref: '#/components/responses/AdminOnlyError'
  /admin/auth/sessions/{sessionId}/revoke:
