  /driver/orders/{orderId}/accept:
    post:
      summary: Accept a waiting order as current driver
      description: Moves a waiting order to loading and appends a driver_accepted event. The current driver must have approved identity and vehicle certification, and current acceptance settings must be online. Requires Idempotency-Key and baseUpdatedAtIso. Reusing the same Idempotency-Key with the same normalized request replays the first successful order snapshot.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
          example: order_01J1Z7P7V2QM9B3V8M3G1N6K8S
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverAcceptOrderRequest'
      responses:
        '200':
          description: Driver accepted order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperOrderResponse'
        '400':
          description: Idempotency key is missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: IDEMPOTENCY_KEY_INVALID
                message: Idempotency-Key 无效
                requestId: req_local
                timestamp: '2026-07-12T08:00:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Current authenticated user is not a driver, Driver identity or vehicle certification is not approved, or current acceptance settings are offline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: DRIVER_CERTIFICATION_REQUIRED
                message: 司机实名和车辆认证通过后才能接单
                requestId: req_local
                timestamp: '2026-07-06T08:00:00.000Z'
        '404':
          description: Order does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: ORDER_NOT_FOUND
                message: 订单不存在
                requestId: req_local
                timestamp: '2026-07-06T08:00:00.000Z'
        '409':
          description: Idempotency key was reused or expired, order base version is stale, or current order status cannot be accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                keyReused:
                  summary: Same key reused for a different request
                  value:
                    code: IDEMPOTENCY_KEY_REUSED
                    message: Idempotency-Key 已被其他请求复用
                    requestId: req_local
                    timestamp: '2026-07-12T08:10:00.000Z'
                keyExpired:
                  summary: Replay window expired
                  value:
                    code: IDEMPOTENCY_KEY_EXPIRED
                    message: Idempotency-Key 已过期
                    requestId: req_local
                    timestamp: '2026-07-13T08:10:00.000Z'
                orderConflict:
                  summary: Base order version is stale
                  value:
                    code: ORDER_CONFLICT
                    message: 订单已被其他操作更新
                    requestId: req_local
                    timestamp: '2026-07-12T08:11:00.000Z'
                stateInvalid:
                  summary: Current order state cannot be accepted
                  value:
                    code: ORDER_STATE_INVALID
                    message: 当前订单已不可接单
                    requestId: req_local
                    timestamp: '2026-07-06T08:00:00.000Z'
