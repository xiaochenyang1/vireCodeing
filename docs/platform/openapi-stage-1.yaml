        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShipperOrderRequest'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperOrderResponse'
        '400':
          description: Idempotency key is missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: IDEMPOTENCY_KEY_INVALID
                message: Idempotency-Key 无效
                requestId: req_local
                timestamp: '2026-07-12T08:00:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ShipperOnlyError'
        '404':
          description: Order does not exist or does not belong to current shipper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: ORDER_NOT_FOUND
                message: 订单不存在
                requestId: req_local
