    MeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AuthenticatedUser'
    CreateShipperOrderRequest:
      type: object
      required:
        - cargoType
        - weightText
        - quantityText
        - pickupAddress
        - pickupContact
        - pickupPhone
        - deliveryAddress
        - deliveryContact
        - deliveryPhone
        - vehicleRequirement
        - needTailboard
        - needTarp
        - pickupTimeIso
        - pricingMode
        - paymentMethod
      properties:
        cargoType:
          type: string
          minLength: 1
          example: 数码
        weightText:
          type: string
          minLength: 1
          example: 1.8 吨
        volumeText:
          type: string
          example: 8 方
        quantityText:
          type: string
          minLength: 1
          example: 18 箱
        cargoDescription:
          type: string
          maxLength: 200
          example: 高价值设备，轻拿轻放
        cargoPhotoCount:
          type: integer
          minimum: 0
          maximum: 6
          example: 2
        cargoPhotoFileIds:
          type: array
          maxItems: 6
          description: Order cargo photo file ids. Files must belong to the current shipper, be uploaded, and use cargo purpose. When present, cargoPhotoCount is derived from this array length.
          items:
            type: string
            minLength: 1
            maxLength: 120
          example:
            - file-cargo-1
        pickupAddress:
          type: string
          minLength: 1
          example: 宝安临时仓
        pickupNoteText:
          type: string
          maxLength: 50
          example: 西门装货
        pickupContact:
          type: string
          minLength: 1
          example: 赵经理
        pickupPhone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          example: '13800138001'
        deliveryAddress:
          type: string
          minLength: 1
          example: 南山门店新址
        deliveryNoteText:
          type: string
          maxLength: 50
          example: 到店联系收货
        deliveryContact:
          type: string
          minLength: 1
          example: 钱店长
        deliveryPhone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          example: '13800138002'
        vehicleRequirement:
          type: string
          minLength: 1
          example: 中型货车
        vehicleLengthText:
          type: string
          example: 4.2 米
        needTailboard:
          type: boolean
          example: false
        needTarp:
          type: boolean
          example: false
        pickupTimeIso:
          type: string
          format: date-time
          example: '2026-07-02T01:30:00.000Z'
        expectedDeliveryTimeText:
          type: string
          example: 当天送达
        valueAddedServicesText:
          type: string
          example: 装卸协助（2 人）
        pricingMode:
          type: string
          enum: [fixed, negotiable]
          description: When pricingMode is negotiable, priceCents and coupon pricing fields must be omitted.
        priceCents:
          type: integer
          minimum: 1
          description: Required when pricingMode is fixed; omitted when pricingMode is negotiable.
          example: 76000
        paymentMethod:
          type: string
          enum: [cod, online]
        couponId:
          type: string
          description: For a fixed price couponed order, couponId, couponTitle, couponDiscountCents and payablePriceCents must be provided together.
          example: coupon-new-user
        couponTitle:
          type: string
          example: 新用户立减券
        couponDiscountCents:
          type: integer
          minimum: 0
          example: 5000
        payablePriceCents:
          type: integer
          minimum: 0
          description: For a fixed price couponed order, couponId, couponTitle, couponDiscountCents and payablePriceCents must be provided together; payablePriceCents must equal priceCents minus couponDiscountCents.
          example: 71000
    CancelShipperOrderRequest:
      type: object
      required: [reasonText]
      properties:
        reasonText:
          type: string
          minLength: 1
          maxLength: 50
          example: 计划有变
        description:
          type: string
          maxLength: 200
          example: 客户临时调整发货计划
    AdvanceShipperOrderStatusRequest:
      type: object
      required: [nextStatus]
      properties:
        nextStatus:
          type: string
          enum: [loading, transporting, confirming]
          example: loading
    ReportShipperOrderExceptionRequest:
      type: object
      required: [typeLabel, description]
      properties:
        typeLabel:
          type: string
          minLength: 1
          maxLength: 30
          example: 司机延误
        description:
          type: string
          minLength: 6
          maxLength: 200
          example: 司机反馈高速拥堵，预计晚到 40 分钟
        photoCount:
          type: integer
          minimum: 0
          maximum: 6
          example: 2
        photoFileIds:
          type: array
          maxItems: 6
          description: Uploaded exception file ids to bind to the exception event.
          items:
            type: string
            minLength: 1
            maxLength: 120
          example: [file-exception-delay-1]
    SubmitShipperOrderChangeRequest:
      type: object
      required: [description]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 200
          example: 请把卸货地址改到南山门店二期，装货时间顺延 1 小时
    SubmitShipperOrderEvaluationRequest:
      type: object
      required: [rating, tags, content]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        tags:
          type: array
          minItems: 1
          maxItems: 6
          items:
            type: string
            minLength: 1
          example: [准时, 服务好]
        content:
          type: string
          minLength: 6
          maxLength: 200
          example: 司机服务细致，整体运输体验很好
        anonymous:
          type: boolean
          example: false
        photoCount:
          type: integer
          minimum: 0
          maximum: 6
          example: 1
        photoFileIds:
          type: array
          maxItems: 6
          description: Uploaded evaluation file ids to bind to the evaluation event.
          items:
            type: string
            minLength: 1
            maxLength: 120
          example: [file-evaluation-photo-1]
    CreateFileUploadIntentRequest:
      type: object
      required: [purpose, fileName, contentType, byteSize]
      properties:
        purpose:
          type: string
          enum: [identity, cargo, exception, evaluation, receipt, invoice]
          description: Business purpose for the file object.
          example: identity
        fileName:
          type: string
          minLength: 1
          maxLength: 120
          example: 身份证正面.png
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp, application/pdf]
          example: image/png
        byteSize:
          type: integer
          minimum: 1
          maximum: 10485760
          example: 2048
    ConfirmFileUploadedRequest:
      type: object
      properties:
        publicUrl:
          type: string
          example: https://cdn.example.com/user-1/identity/file-1.png
    ConfirmStorageCallbackRequest:
      type: object
      required: [fileId, objectKey, byteSize, contentType, signature]
      properties:
        fileId:
          type: string
          minLength: 1
          example: file_01J1Z7P7V2QM9B3V8M3G1N6K8S
        objectKey:
          type: string
          minLength: 1
          example: user-1/cargo/20260707050000000/file-cargo-1.jpg
        byteSize:
          type: integer
          minimum: 1
          example: 2048
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp, application/pdf]
          example: image/jpeg
        etag:
          type: string
          description: Optional object storage entity tag from the uploaded object.
          example: '"etag-1"'
        versionId:
          type: string
          description: Optional object storage version id from versioned buckets.
          example: version-1
        signature:
          type: string
          minLength: 1
          description: HMAC-SHA256 hex signature using FILE_STORAGE_CALLBACK_SIGNING_SECRET.
          example: 477a3f0f0a12bdb2840ef7cce80e13f2b36925c631552d2d8f899a3e2f063214
    FileUploadRecord:
      type: object
      required:
        - id
        - ownerUserId
        - purpose
        - contentType
        - byteSize
        - objectKey
        - status
        - createdAtIso
      properties:
        id:
          type: string
          example: file_01J1Z7P7V2QM9B3V8M3G1N6K8S
        ownerUserId:
          type: string
          example: user-1
        purpose:
          type: string
          enum: [identity, cargo, exception, evaluation, receipt, invoice]
        contentType:
          type: string
          example: image/png
        byteSize:
          type: integer
          minimum: 1
          maximum: 10485760
          example: 2048
        objectKey:
          type: string
          example: user-1/identity/20260706030000000/file-1.png
        publicUrl:
          type: string
          example: https://cdn.example.com/user-1/identity/file-1.png
        etag:
          type: string
          description: Object storage entity tag saved from upload confirmation callback when available.
          example: '"etag-1"'
        versionId:
          type: string
          description: Object storage version id saved from upload confirmation callback when available.
          example: version-1
        status:
          type: string
          enum: [pending, uploaded, rejected]
        createdAtIso:
          type: string
          format: date-time
          example: '2026-07-06T03:00:00.000Z'
    FileUploadIntent:
