            refundedAtIso:
              type: string
              format: date-time
              example: '2026-07-15T10:10:00.000Z'
            createdAtIso:
              type: string
              format: date-time
              example: '2026-07-01T08:00:00.000Z'
            updatedAtIso:
              type: string
              format: date-time
              description: Use this value as the baseUpdatedAtIso for the next protected order mutation.
              example: '2026-07-01T08:00:00.000Z'
