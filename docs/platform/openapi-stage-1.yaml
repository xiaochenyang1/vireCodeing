openapi: 3.0.3
info:
  title: Truck Platform Stage 1 API
  version: 0.1.0
servers:
  - url: http://localhost:3000/api
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /auth/send-code:
    post:
      summary: Send verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCodeRequest'
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCodeResponse'
        '429':
          description: Verification code sending is rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_CODE_RATE_LIMITED
                message: 验证码发送过于频繁
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '502':
          description: Verification code delivery provider failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_CODE_DELIVERY_FAILED
                message: 验证码发送失败
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
  /auth/login:
    post:
      summary: Login with phone and verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/password-login:
    post:
      summary: Login with phone and password
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
      responses:
        '200':
          description: Password login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordLoginResponse'
        '401':
          description: Phone or password is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_PASSWORD_INVALID
                message: 手机号或密码错误
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/register:
    post:
      summary: Register with phone and verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Register success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/reset-password:
    post:
      summary: Reset password with phone and verification code
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordResponse'
        '401':
          description: Phone or verification code is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_PASSWORD_RESET_INVALID
                message: 手机号或验证码错误
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/change-password:
    post:
      summary: Change current authenticated user password
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password change success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        '401':
          description: Current password or access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: AUTH_PASSWORD_INVALID
                message: 当前密码错误
                requestId: req_local
                timestamp: '2026-06-26T06:00:00.000Z'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/refresh:
    post:
      summary: Refresh access token
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /auth/logout:
    post:
      summary: Logout current device session
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
  /me:
    get:
      summary: Current user profile
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /files/upload-intents:
    post:
      summary: Create file upload intent
      description: Creates a pending file object for the current user and returns a first-slice upload URL. This stage records metadata only; real object storage direct upload can replace the uploadUrl later.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileUploadIntentRequest'
      responses:
        '200':
          description: File upload intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadIntentResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /files/{fileId}:
    get:
      summary: Get current user file metadata
      description: Returns file metadata for the current file owner. Admin users may read any file metadata; non-owner users receive FILE_NOT_FOUND so file ids cannot be enumerated across accounts.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          example: file_01J1Z7P7V2QM9B3V8M3G1N6K8S
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadRecordResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
        '404':
          description: File does not exist or does not belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
  /files/{fileId}/uploaded:
    post:
      summary: Confirm file upload completion
      description: Marks a current user's pending file object as uploaded before the upload intent expires. In s3-compatible storage mode the backend first verifies the remote object with a signed HEAD request before changing state.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          example: file_01J1Z7P7V2QM9B3V8M3G1N6K8S
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmFileUploadedRequest'
      responses:
        '200':
          description: File upload confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadRecordResponse'
        '404':
          description: File does not exist or does not belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '409':
          description: File is not pending, the upload intent has expired, or the local binary body does not match the declared byteSize/contentType
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 文件状态不允许确认
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /files/storage-callbacks/s3-compatible:
    post:
      summary: Confirm S3 compatible storage callback
      description: Confirms a pending file from a signed S3-compatible storage callback, stores optional etag/versionId metadata, and marks the file as uploaded. Valid repeated callbacks with matching metadata are idempotent. The callback signature is HMAC-SHA256 using FILE_STORAGE_CALLBACK_SIGNING_SECRET over fileId, objectKey, byteSize, contentType, etag and versionId joined by newlines.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmStorageCallbackRequest'
      responses:
        '200':
          description: Storage callback accepted and file upload confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadRecordResponse'
        '400':
          description: Storage callback signature is invalid or callback signing secret is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STORAGE_CALLBACK_INVALID
                message: 对象存储回调签名无效
                requestId: req_storage_callback
                timestamp: '2026-07-07T05:00:00.000Z'
        '404':
          description: File does not exist or objectKey does not match the file record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_storage_callback
                timestamp: '2026-07-07T05:00:00.000Z'
        '409':
          description: File state, upload intent expiry, byteSize, contentType, etag or versionId does not allow callback confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 对象存储回调元数据与上传意图不一致
                requestId: req_storage_callback
                timestamp: '2026-07-07T05:00:00.000Z'
  /files/maintenance/reject-expired-pending:
    post:
      summary: Reject expired pending file upload intents
      description: Admin-only maintenance endpoint. Marks pending file objects older than the configured upload expiry cutoff as rejected, without touching uploaded files or current pending upload intents.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Expired pending files rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectExpiredPendingFilesResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Current authenticated user is not an admin, or authenticated user is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    code: AUTH_FORBIDDEN
                    message: 当前账号不是管理员
                    requestId: req_file_cleanup
                    timestamp: '2026-07-07T06:00:00.000Z'
                disabled:
                  value:
                    code: AUTH_USER_DISABLED
                    message: 账号已禁用
                    requestId: req_file_cleanup
                    timestamp: '2026-07-07T06:00:00.000Z'
  /files/maintenance/summary:
    get:
      summary: Get file maintenance summary
      description: Admin-only maintenance endpoint. Returns aggregate file object counts and the current upload expiry cutoff so admins can audit pending cleanup before running it.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File maintenance summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMaintenanceSummaryResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Current authenticated user is not an admin, or authenticated user is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    code: AUTH_FORBIDDEN
                    message: 当前账号不是管理员
                    requestId: req_file_summary
                    timestamp: '2026-07-07T06:00:00.000Z'
                disabled:
                  value:
                    code: AUTH_USER_DISABLED
                    message: 账号已禁用
                    requestId: req_file_summary
                    timestamp: '2026-07-07T06:00:00.000Z'
  /files/maintenance/delete-rejected-objects:
    post:
      summary: Retry rejected file object deletion
      description: Admin-only maintenance endpoint. Attempts best-effort provider object deletion for file objects already marked rejected, useful after earlier cleanup runs recorded failedObjectDeletionCount.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Rejected file object deletion attempted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRejectedFileObjectsResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Current authenticated user is not an admin, or authenticated user is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    code: AUTH_FORBIDDEN
                    message: 当前账号不是管理员
                    requestId: req_file_delete_rejected
                    timestamp: '2026-07-07T06:00:00.000Z'
                disabled:
                  value:
                    code: AUTH_USER_DISABLED
                    message: 账号已禁用
                    requestId: req_file_delete_rejected
                    timestamp: '2026-07-07T06:00:00.000Z'
  /files/uploads/{fileId}:
    post:
      summary: Confirm local upload target
      description: Receives binary file content for the local development storage provider, writes it under FILE_STORAGE_ROOT/objectKey, then marks the current user's pending file object as uploaded before the upload intent expires. Real object storage direct upload callbacks can replace this later.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          example: file_01J1Z7P7V2QM9B3V8M3G1N6K8S
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Local upload target confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadRecordResponse'
        '404':
          description: File does not exist or does not belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '409':
          description: File is not pending or the upload intent has expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 文件状态不允许确认
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/DisabledUserError'
  /files/previews/{objectKey}:
    get:
      summary: Get signed file preview metadata
      description: Returns uploaded file metadata after validating the short-lived preview signature. The objectKey path value is the wildcard suffix after /files/previews/ and may contain slashes. Binary local preview content is available through /files/preview-contents/{objectKey}.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: objectKey
          in: path
          required: true
          description: File object key captured as the wildcard suffix after /files/previews/.
          schema:
            type: string
          example: user-1/identity/20260706030000000/file-1.png
        - name: expiresAtIso
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-07-06T03:10:00.000Z'
        - name: signature
          in: query
          required: true
          schema:
            type: string
          example: 92ad73eab5d5a99628f721aff86b9d439b0335d31e275c3bf733645ff52f449d
      security: []
      responses:
        '200':
          description: Signed file preview metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilePreviewMetadataResponse'
        '401':
          description: Preview signature is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_PREVIEW_SIGNATURE_INVALID
                message: 预览链接无效或已过期
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '404':
          description: File object key does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '409':
          description: File is not uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 文件尚未上传完成
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
  /files/preview-contents/{objectKey}:
    get:
      summary: Get signed file preview content
      description: Returns the local binary file content after validating the short-lived preview signature. The objectKey path value is the wildcard suffix after /files/preview-contents/ and may contain slashes. Real object storage preview redirects can replace this local provider endpoint later.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - name: objectKey
          in: path
          required: true
          description: File object key captured as the wildcard suffix after /files/preview-contents/.
          schema:
            type: string
          example: user-1/identity/20260706030000000/file-1.png
        - name: expiresAtIso
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-07-06T03:10:00.000Z'
        - name: signature
          in: query
          required: true
          schema:
            type: string
          example: 92ad73eab5d5a99628f721aff86b9d439b0335d31e275c3bf733645ff52f449d
      security: []
      responses:
        '200':
          description: Signed file preview binary content
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Preview signature is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_PREVIEW_SIGNATURE_INVALID
                message: 预览链接无效或已过期
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '404':
          description: File object key does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '409':
          description: File is not uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 文件尚未上传完成
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
  /shipper/order-draft:
    get:
      summary: Get current shipper order draft
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current shipper order draft. Data is null when no draft exists. Drafts older than 24 hours are treated as missing and return null data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperOrderDraftResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ShipperOnlyError'
    put:
      summary: Save current shipper order draft
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveShipperOrderDraftRequest'
      responses:
        '200':
          description: Current shipper order draft saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperOrderDraftResponse'
        '409':
          description: The draft has been updated by another device after the client's base version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: ORDER_DRAFT_CONFLICT
                message: 发单草稿已被其他设备更新，请先拉取最新草稿后再保存。
                requestId: req_local
                timestamp: '2026-07-02T09:05:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ShipperOnlyError'
  /shipper/profile/account:
    get:
      summary: Get current shipper profile account
      description: Returns the current shipper's saved account snapshot. Data is null when no platform account snapshot has been saved yet.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current shipper profile account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipperProfileAccountResponse'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/ShipperOnlyError'
    put:
