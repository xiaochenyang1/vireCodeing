components:
  parameters:
    RequestIdHeader:
      name: x-request-id
      in: header
      required: false
      schema:
        type: string
      description: Optional request correlation id echoed in success and business error responses.
      example: req_mobile_001
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    DisabledUserError:
      description: Authenticated user is disabled
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTH_USER_DISABLED
            message: 账号已禁用
            requestId: req_local
            timestamp: '2026-06-26T06:00:00.000Z'
    ShipperOnlyError:
      description: Current authenticated user is not a shipper
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTH_FORBIDDEN
            message: 当前账号不是货主
            requestId: req_local
            timestamp: '2026-07-06T08:00:00.000Z'
    AdminOnlyError:
      description: Current authenticated user is not an admin
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTH_FORBIDDEN
            message: 当前账号不是管理员
            requestId: req_local
            timestamp: '2026-07-09T10:00:00.000Z'
  schemas:
    SendCodeRequest:
      type: object
      required: [phone, purpose]
      properties:
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          example: '13800138000'
        purpose:
          type: string
          enum: [login, register, reset]
    SendCodeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/SendCodeResult'
    SendCodeResult:
      type: object
      required: [expireSeconds]
      properties:
        expireSeconds:
          type: integer
          example: 300
        devCode:
          type: string
          description: Returned only in non-production environments.
          example: '123456'
    LoginRequest:
      type: object
      required: [phone, code, userType, deviceId]
      properties:
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
        code:
          type: string
          pattern: '^\d{6}$'
        userType:
          type: string
          enum: [shipper, driver]
        deviceId:
          type: string
          minLength: 1
    RegisterRequest:
      type: object
      required: [phone, code, userType, deviceId, password]
      properties:
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
        code:
          type: string
          pattern: '^\d{6}$'
        userType:
          type: string
          enum: [shipper, driver]
        deviceId:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 6
          writeOnly: true
          description: 密码需至少 6 位并包含字母和数字。
    PasswordLoginRequest:
      type: object
      required: [phone, password, userType, deviceId]
      properties:
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
        password:
          type: string
          minLength: 6
          writeOnly: true
          description: 密码需至少 6 位并包含字母和数字。
        userType:
          type: string
          enum: [shipper, driver]
        deviceId:
          type: string
          minLength: 1
    ResetPasswordRequest:
      type: object
      required: [phone, code, password]
      properties:
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
        code:
          type: string
          pattern: '^\d{6}$'
        password:
          type: string
          minLength: 6
          writeOnly: true
          description: 密码需至少 6 位并包含字母和数字。
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
          writeOnly: true
        newPassword:
          type: string
          minLength: 6
          writeOnly: true
          description: 密码需至少 6 位并包含字母和数字。
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/LoginResult'
    LoginResult:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        tokens:
          $ref: '#/components/schemas/TokenPair'
    RegisterResponse:
      allOf:
        - $ref: '#/components/schemas/LoginResponse'
    PasswordLoginResponse:
      allOf:
        - $ref: '#/components/schemas/LoginResponse'
    ResetPasswordResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ResetPasswordResult'
    ResetPasswordResult:
      type: object
      required: [reset]
      properties:
        reset:
          type: boolean
          enum: [true]
          example: true
    ChangePasswordResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ChangePasswordResult'
    ChangePasswordResult:
      type: object
      required: [changed]
      properties:
        changed:
          type: boolean
          enum: [true]
          example: true
    RefreshRequest:
      type: object
      required: [refreshToken, deviceId]
      properties:
        refreshToken:
          type: string
          pattern: '^refresh\.[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
