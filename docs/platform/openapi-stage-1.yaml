                timestamp: '2026-07-06T03:00:00.000Z'
        '409':
          description: File is not uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_STATE_INVALID
                message: 文件尚未上传完成
                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
