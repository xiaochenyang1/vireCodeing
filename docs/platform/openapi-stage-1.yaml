                requestId: req_local
                timestamp: '2026-07-06T03:00:00.000Z'
        '404':
          description: File object key does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FILE_NOT_FOUND
                message: 文件不存在
