          schema: { type: string, enum: [current_admin, all], default: current_admin }
        - name: userType
          in: query
          required: false
          schema: { type: string, enum: [shipper, driver, admin] }
        - name: keyword
          in: query
          required: false
          schema: { type: string, maxLength: 60 }
        - name: riskOnly
          in: query
          required: false
          description: When `true`, only return sessions tagged by the first-slice device risk rules.
          schema: { type: boolean }
        - name: riskTag
          in: query
          required: false
          description: Filter sessions by a specific first-slice device risk tag.
          schema:
            $ref: '#/components/schemas/AdminAuthSessionRiskTag'
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      security: [{ bearerAuth: [] }]
