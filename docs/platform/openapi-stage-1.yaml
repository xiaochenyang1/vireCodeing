          type: string
          description: Order event type. Driver first-slice events include driver_quote_submitted, driver_accepted, driver_status_changed, driver_exception_reported, evaluation_replied and shipper_evaluation_submitted.
          enum:
            - created
            - status_advanced
            - cancelled
            - completed
            - exception_reported
            - change_requested
            - evaluation_submitted
            - driver_quote_submitted
            - driver_accepted
            - driver_status_changed
            - driver_exception_reported
            - evaluation_replied
            - shipper_evaluation_submitted
            - exception_compensation_executed
            - exception_appeal_requested
          example: driver_quote_submitted
