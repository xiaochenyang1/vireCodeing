  /admin/orders/batch-cancel:
    post:
      summary: Cancel waiting admin orders in one atomic batch
      description: Cancels multiple waiting orders from admin in one atomic batch. Requires Idempotency-Key. The request is validated atomically: any missing order, duplicate orderId, stale base version, or non-waiting order aborts the whole batch and nothing is committed.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCancelAdminOrdersRequest'
      responses:
        '200':
          description: Admin orders batch cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCancelAdminOrdersResponse'
        '400':
          description: Request body is invalid or Idempotency-Key is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_idempotency_key:
                  value:
                    code: IDEMPOTENCY_KEY_INVALID
                    message: Idempotency-Key 无效
                    requestId: req_local
                    timestamp: '2026-07-18T03:00:00.000Z'
                duplicate_order_ids:
                  value:
                    code: VALIDATION_ERROR
                    message: 批量取消订单 ID 不能重复
                    requestId: req_local
                    timestamp: '2026-07-22T08:00:00.000Z'
        '401':
          description: Access token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/AdminOnlyError'
        '404':
          description: At least one order does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: ORDER_NOT_FOUND
                message: 订单不存在
                requestId: req_local
                timestamp: '2026-07-22T08:00:00.000Z'
        '409':
          description: Idempotency key was reused or expired, at least one order base version is stale, or at least one current order status does not allow admin batch cancellation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                idempotency_key_reused:
                  value:
                    code: IDEMPOTENCY_KEY_REUSED
                    message: Idempotency-Key 已被其他请求复用
                    requestId: req_local
                    timestamp: '2026-07-22T08:00:00.000Z'
                idempotency_key_expired:
                  value:
                    code: IDEMPOTENCY_KEY_EXPIRED
                    message: Idempotency-Key 已过期
                    requestId: req_local
                    timestamp: '2026-07-22T08:00:00.000Z'
                order_conflict:
                  value:
                    code: ORDER_CONFLICT
                    message: 订单已被其他操作更新
                    requestId: req_local
                    timestamp: '2026-07-22T08:00:00.000Z'
                state_invalid:
                  value:
                    code: ORDER_STATE_INVALID
                    message: 当前订单状态不允许批量取消
                    requestId: req_local
                    timestamp: '2026-07-22T08:00:00.000Z'
