    ShipperOrderStatus:
      type: string
      enum: [waiting, loading, transporting, confirming, completed, cancelled]
    ShipperOrder:
      allOf:
        - $ref: '#/components/schemas/CreateShipperOrderRequest'
        - type: object
          required:
            - id
            - orderNo
            - shipperId
            - status
            - createdAtIso
            - updatedAtIso
            - events
          properties:
            id:
              type: string
              example: order_01J1Z7P7V2QM9B3V8M3G1N6K8S
            orderNo:
              type: string
              example: HY202607010777
            shipperId:
              type: string
              example: user-platform-order
            status:
              $ref: '#/components/schemas/ShipperOrderStatus'
            createdAtIso:
              type: string
              format: date-time
              example: '2026-07-01T08:00:00.000Z'
            updatedAtIso:
              type: string
              format: date-time
              example: '2026-07-01T08:00:00.000Z'
            events:
              type: array
              items:
                $ref: '#/components/schemas/ShipperOrderEvent'
    ShipperOrderEvent:
      type: object
      required: [id, eventType, createdAtIso]
      properties:
        id:
          type: string
          example: order_event_01J1Z7P7V2QM9B3V8M3G1N6K8S
        eventType:
          type: string
          description: Order event type. Driver first-slice events include driver_quote_submitted, driver_accepted, driver_status_changed, evaluation_replied and shipper_evaluation_submitted.
          enum:
            - created
            - status_advanced
            - cancelled
            - completed
            - exception_reported
            - change_requested
            - evaluation_submitted
            - driver_quote_submitted
            - driver_accepted
            - driver_status_changed
            - evaluation_replied
            - shipper_evaluation_submitted
          example: driver_quote_submitted
        actorUserId:
          type: string
          description: User id that produced this event when the actor is not implied by the order owner.
          example: user-driver-001
        noteText:
          type: string
          description: Free text note or compact JSON payload for first-slice driver quote metadata.
          example: '{"quoteCents":88000,"arrivalText":"45 分钟到达","noteText":"可带尾板"}'
        attachmentFileIds:
          type: array
          description: Order event attachment file ids. Created and updated order events include cargo photo file ids when cargoPhotoFileIds are submitted.
          items:
            type: string
          example: [file-exception-delay-1]
        createdAtIso:
          type: string
          format: date-time
          example: '2026-07-01T08:00:00.000Z'
    AdminOrderAttachmentFileRecord:
      allOf:
        - $ref: '#/components/schemas/FileUploadRecord'
        - type: object
          required: [previewUrl, previewExpiresAtIso]
          properties:
            previewUrl:
              type: string
              format: uri
              description: Signed short-lived preview URL for admin order attachment audit.
              example: '/api/files/preview-contents/shipper-1/cargo/file-cargo-1.png?expiresAtIso=2026-07-06T08%3A10%3A00.000Z&signature=local-signature'
            previewExpiresAtIso:
              type: string
              format: date-time
              description: Expiration time for the signed admin order attachment preview URL.
              example: '2026-07-06T08:10:00.000Z'
    AdminOrderAttachmentFileGroup:
      type: object
      required: [fileIds, files, missingFileIds]
      properties:
        fileIds:
          type: array
          description: Normalized attachment file ids stored on the order body or event snapshot.
          items:
            type: string
          example: [file-cargo-1]
        files:
          type: array
          description: File metadata found for the normalized file ids.
          items:
            $ref: '#/components/schemas/AdminOrderAttachmentFileRecord'
        missingFileIds:
          type: array
          description: Attachment file ids referenced by the order or event but not found in file metadata storage.
          items:
            type: string
          example: []
    AdminOrderAttachmentAuditEvent:
      type: object
      required: [eventId, eventType, createdAtIso, attachmentFileIds, files, missingFileIds]
      properties:
        eventId:
          type: string
          example: order_event_01J1Z7P7V2QM9B3V8M3G1N6K8S
        eventType:
          type: string
          description: Order event type with attachment file ids.
          example: created
        noteText:
          type: string
          description: Free text note or compact JSON payload stored on the order event.
          example: '{"cargoPhotoFileIds":["file-cargo-1"]}'
        createdAtIso:
          type: string
          format: date-time
          example: '2026-07-01T08:00:00.000Z'
        attachmentFileIds:
          type: array
          description: Normalized attachment file ids stored on this order event snapshot.
          items:
            type: string
          example: [file-cargo-1]
        files:
          type: array
          description: File metadata found for this event attachment snapshot.
          items:
            $ref: '#/components/schemas/AdminOrderAttachmentFileRecord'
        missingFileIds:
          type: array
          description: Event attachment file ids that no longer resolve to file metadata.
          items:
            type: string
          example: []
    AdminOrderAttachmentAudit:
      type: object
      required: [orderId, orderNo, shipperId, cargo, events]
      properties:
        orderId:
          type: string
          example: order_01J1Z7P7V2QM9B3V8M3G1N6K8S
        orderNo:
          type: string
          example: HY202607010777
        shipperId:
          type: string
          example: user-platform-order
        cargo:
          $ref: '#/components/schemas/AdminOrderAttachmentFileGroup'
        events:
          type: array
          description: Order events that contain attachment file ids.
          items:
            $ref: '#/components/schemas/AdminOrderAttachmentAuditEvent'
    AdminOrderAttachmentAuditSummary:
      type: object
      required:
        - orderId
        - orderNo
        - shipperId
        - status
        - createdAtIso
        - cargoFileCount
        - eventAttachmentFileCount
        - totalFileIdCount
        - resolvedFileCount
        - missingFileIds
        - hasMissingFiles
      properties:
        orderId:
          type: string
          example: order_01J1Z7P7V2QM9B3V8M3G1N6K8S
        orderNo:
          type: string
          example: HY202607010777
        shipperId:
          type: string
          example: user-platform-order
        status:
          $ref: '#/components/schemas/ShipperOrderStatus'
        createdAtIso:
          type: string
          format: date-time
          example: '2026-07-01T08:00:00.000Z'
        cargoFileCount:
          type: integer
          description: Unique cargo attachment file id count stored on the order body.
          example: 1
        eventAttachmentFileCount:
          type: integer
          description: Unique attachment file id count stored across order event snapshots.
          example: 2
        totalFileIdCount:
          type: integer
          description: Unique file id count across cargo and event attachment references.
          example: 2
        resolvedFileCount:
          type: integer
          description: File id count that resolves to file metadata storage.
          example: 1
        missingFileIds:
          type: array
          description: Attachment file ids referenced by the order or events but not found in file metadata storage.
          items:
            type: string
          example: [file-missing-cargo]
        hasMissingFiles:
          type: boolean
          example: true
