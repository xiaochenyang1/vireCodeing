    post:
      summary: Create current shipper invoice application
      description: Creates a reviewing invoice application for the current shipper. Only current shipper completed orders can be selected. amountCents is derived from payablePriceCents when present, otherwise falls back to priceCents. Non-rejected historical invoice applications occupy selected orders and rejected applications may reuse order ids. vat-special invoice applications require a non-rejected enterprise verification snapshot.
